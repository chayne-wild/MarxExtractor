<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capital Context Extractor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        /* Custom scrollbar for the output area */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        body { 
            background-color: #f8fafc; 
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
    </style>
</head>
<body class="text-slate-900 min-h-screen flex flex-col selection:bg-indigo-100 selection:text-indigo-900">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 shrink-0 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-1.5 rounded-lg">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                </div>
                <h1 class="text-lg font-semibold tracking-tight text-slate-900">Context Extractor <span class="text-slate-400 font-normal ml-1">| Capital Volumes I-III</span></h1>
            </div>
            <a href="https://github.com/chayne-wild" target="_blank" class="text-sm font-medium text-slate-500 hover:text-slate-900 transition-colors flex items-center gap-1.5">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd"></path></svg>
                GitHub
            </a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col md:flex-row max-w-7xl w-full mx-auto p-4 sm:p-6 gap-6 min-h-0">
        
        <!-- Controls Sidebar -->
        <aside class="w-full md:w-[380px] flex flex-col gap-6 shrink-0 md:sticky md:top-[5.5rem] md:h-[calc(100vh-7rem)] overflow-y-auto custom-scroll pb-4">
            
            <!-- Configuration Card -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden shrink-0">
                <div class="px-5 py-4 border-b border-slate-100 bg-slate-50/50">
                    <h2 class="text-sm font-semibold text-slate-800">Extraction Parameters</h2>
                </div>
                <div class="p-5">
                    <div class="mb-5">
                        <label class="block text-sm font-medium text-slate-700 mb-1.5">Target Keywords</label>
                        <textarea id="keywordInput" rows="4" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 text-sm font-mono text-slate-600 transition-all resize-none shadow-sm placeholder:text-slate-400" placeholder="africa|egypt|black|slaves?|colonial"></textarea>
                        <p class="text-[11px] text-slate-500 mt-2 leading-relaxed">Regex supported. Separate terms with <code>|</code>. Use <code>\b</code> for word boundaries.</p>
                    </div>

                    <div class="mb-6">
                        <label class="block text-sm font-medium text-slate-700 mb-1.5">Data Source</label>
                        <select id="sourceSelect" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 text-sm text-slate-700 transition-all shadow-sm appearance-none cursor-pointer" style="background-image: url(&quot;data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e&quot;); background-position: right 0.5rem center; background-repeat: no-repeat; background-size: 1.5em 1.5em; padding-right: 2.5rem;">
                            <option value="html_marxists_all">All Volumes (I, II, & III)</option>
                            <option value="html_marxists_v1">Volume I - Process of Production</option>
                            <option value="html_marxists_v2">Volume II - Circulation of Capital</option>
                            <option value="html_marxists_v3">Volume III - Production as a Whole</option>
                        </select>
                    </div>

                    <button id="extractBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 text-white font-medium py-2.5 px-4 rounded-lg shadow-sm transition-all disabled:bg-slate-300 disabled:text-slate-500 disabled:cursor-not-allowed flex justify-center items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        Run Extraction
                    </button>
                </div>
            </div>

            <!-- Status Card -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col relative flex-grow min-h-[180px]">
                <div class="px-5 py-4 border-b border-slate-100 bg-slate-50/50 shrink-0">
                    <h2 class="text-sm font-semibold text-slate-800">Job Status</h2>
                </div>
                <div class="p-5 flex-grow flex flex-col justify-center">
                    <div class="flex items-center gap-3 mb-4">
                        <div id="statusIndicator" class="w-2.5 h-2.5 rounded-full bg-slate-300"></div>
                        <div id="statusText" class="text-sm font-medium text-slate-700 uppercase tracking-tight">Ready</div>
                    </div>
                    
                    <div class="w-full bg-slate-100 rounded-full h-1.5 mb-5 hidden overflow-hidden shrink-0" id="progressContainer">
